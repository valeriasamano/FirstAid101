<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstAid101 | Paramedic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3F4F6; }
        .sidebar-icon { @apply w-10 h-10 flex items-center justify-center rounded-full text-gray-400 hover:bg-blue-50 hover:text-blue-600 transition-all; }
        .sidebar-icon.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        .card { @apply bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100; }
        .status-card { @apply relative overflow-hidden rounded-3xl p-4 bg-white border border-gray-100 flex flex-col justify-between h-40; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- BARRA LATERAL (Izquierda) -->
    <aside class="w-20 bg-white border-r border-gray-100 flex flex-col items-center py-8 gap-8">
        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-xs">M+</div>
        <div class="flex flex-col gap-4">
            <button onclick="switchTab('home')" id="btn-home" class="sidebar-icon active"><i class="fas fa-th-large"></i></button>
            <button onclick="switchTab('glosario')" id="btn-glosario" class="sidebar-icon"><i class="fas fa-book-medical"></i></button>
            <button onclick="switchTab('recursos')" id="btn-recursos" class="sidebar-icon"><i class="fas fa-play-circle"></i></button>
            <button onclick="switchTab('profile')" id="btn-profile" class="sidebar-icon"><i class="fas fa-user"></i></button>
        </div>
        <div class="mt-auto">
            <button class="w-10 h-10 bg-gray-50 rounded-full text-gray-300"><i class="fas fa-plus"></i></button>
        </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <!-- HEADER / BUSCADOR -->
        <header class="p-8 flex justify-between items-center">
            <div class="relative w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Search resources, protocols..." class="w-full bg-white border-none rounded-2xl py-3 pl-12 pr-4 shadow-sm focus:ring-2 focus:ring-blue-100 outline-none text-sm">
            </div>
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 bg-blue-600 text-white rounded-full shadow-lg"><i class="fas fa-phone-alt"></i></button>
                <button class="w-10 h-10 bg-white text-gray-400 rounded-full shadow-sm border border-gray-100"><i class="fas fa-bell"></i></button>
                <div class="w-10 h-10 bg-blue-100 rounded-full overflow-hidden border-2 border-white shadow-sm">
                    <img src="https://ui-avatars.com/api/?name=Ana+Valeria&background=0D8ABC&color=fff" alt="Profile">
                </div>
            </div>
        </header>

        <div id="content-area" class="px-8 pb-8 grid grid-cols-12 gap-8">
            
            <!-- COLUMNA IZQUIERDA (Título y Círculo) -->
            <div class="col-span-12 lg:col-span-5 space-y-8">
                <div class="flex gap-4">
                    <span class="bg-gray-200 px-4 py-1 rounded-full text-[10px] font-bold text-gray-600 uppercase">Diagnose</span>
                    <span class="bg-gray-200 px-4 py-1 rounded-full text-[10px] font-bold text-gray-600 uppercase">Protocols</span>
                </div>
                <h1 class="text-7xl font-bold text-gray-900 leading-tight">Quick<br>Reference</h1>
                
                <!-- El Círculo del Estetoscopio -->
                <div class="relative w-80 h-80 mx-auto bg-white rounded-full shadow-inner border-[16px] border-gray-50 flex items-center justify-center">
                    <div class="text-center space-y-2">
                        <i class="fas fa-star-of-life text-blue-600 text-6xl animate-pulse"></i>
                        <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">Ready to serve</p>
                    </div>
                    <!-- Pequeño corazón flotante -->
                    <div class="absolute bottom-10 right-10 w-12 h-12 bg-red-500 rounded-full flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-heart"></i>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA (Cards) -->
            <div class="col-span-12 lg:col-span-7 space-y-8">
                
                <!-- Sección superior: Signos/Métricas -->
                <div>
                    <h2 class="text-blue-600 font-bold mb-6 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span> Vital Parameters
                    </h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="status-card">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-bold text-gray-400 uppercase">Adult HR</span>
                                <i class="fas fa-heartbeat text-blue-100 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-2xl font-bold">60-100</p>
                                <p class="text-[10px] text-gray-400">BPM Normal Range</p>
                            </div>
                        </div>
                        <div class="status-card">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-bold text-gray-400 uppercase">SpO2</span>
                                <i class="fas fa-lungs text-blue-100 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-2xl font-bold">> 94%</p>
                                <p class="text-[10px] text-gray-400">Normal Oxygenation</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sección inferior: Recursos -->
                <div>
                    <h2 class="text-gray-900 font-bold mb-6 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span> Training Resources
                    </h2>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-blue-600 rounded-[2rem] p-4 text-white flex flex-col justify-between h-48 active:scale-95 transition">
                            <i class="fas fa-notes-medical text-2xl opacity-50"></i>
                            <p class="text-sm font-bold">Protocolo<br>RCP 2025</p>
                        </div>
                        <div class="bg-white rounded-[2rem] p-4 border border-gray-100 flex flex-col justify-between h-48 shadow-sm">
                            <i class="fas fa-calculator text-2xl text-blue-600"></i>
                            <p class="text-sm font-bold text-gray-800">Dosis<br>Calculadora</p>
                        </div>
                        <div class="bg-gray-900 rounded-[2rem] p-4 text-white flex flex-col justify-between h-48 active:scale-95 transition">
                            <i class="fas fa-graduation-cap text-2xl opacity-50"></i>
                            <p class="text-sm font-bold">Quiz de<br>Práctica</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function switchTab(tab) {
            // Lógica para cambiar contenido (puedes expandirla luego)
            document.querySelectorAll('.sidebar-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            console.log("Cambiando a: " + tab);
        }
    </script>
</body>
</html>
